# Render Blueprint for Cortex Capital Frontend
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: cortex-capital-frontend
    runtime: node
    region: oregon
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /api/health/
    nodeVersion: "20"
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: BROKER_ENCRYPTION_KEY
        sync: false
      - key: SNAPTRADE_CLIENT_ID
        sync: false
      - key: SNAPTRADE_CONSUMER_KEY
        sync: false
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: CRON_SECRET
        sync: false
      - key: NEXT_PUBLIC_API_URL
        sync: false  # Set manually in dashboard
      - key: PORT
        value: 3000
    autoDeploy: true
    branch: main

  # Auto-trading cron job
  - type: cron
    name: cortex-auto-trade
    runtime: node
    region: oregon
    schedule: "*/15 13-19 * * 1-5"  # Every 15 min during 9:30am-4:00pm ET window (UTC guarded in route)
    buildCommand: npm ci
    startCommand: node -e "fetch('https://cortex-capital.onrender.com/api/cron/auto-trade/?secret=' + process.env.CRON_SECRET).then(r => r.json()).then(console.log).catch(console.error)"
    nodeVersion: "20"
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: CRON_SECRET
        sync: false

  # Daily premarket research snapshot
  - type: cron
    name: cortex-research
    runtime: node
    region: oregon
    schedule: "35 13 * * 1-5" # 6:35 AM PT, Mon-Fri
    buildCommand: npm ci
    startCommand: node -e "fetch('https://cortex-capital.onrender.com/api/cron/research/?secret=' + process.env.CRON_SECRET).then(r => r.json()).then(console.log).catch(console.error)"
    nodeVersion: "20"
    envVars:
      - key: NODE_ENV
        value: production
      - key: CRON_SECRET
        sync: false

  # End-of-day digest
  - type: cron
    name: cortex-daily-digest
    runtime: node
    region: oregon
    schedule: "0 20 * * 1-5" # 4:00 PM ET, Mon-Fri
    buildCommand: npm ci
    startCommand: node -e "fetch('https://cortex-capital.onrender.com/api/cron/daily-digest/?secret=' + process.env.CRON_SECRET).then(r => r.json()).then(console.log).catch(console.error)"
    nodeVersion: "20"
    envVars:
      - key: NODE_ENV
        value: production
      - key: CRON_SECRET
        sync: false
