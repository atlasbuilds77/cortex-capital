<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00D4FF;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#7C3AED;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00D4FF;stop-opacity:1" />
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" />
    </filter>
    <filter id="glow-filter">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Outer glow -->
  <circle cx="60" cy="60" r="50" fill="none" stroke="url(#glow)" stroke-width="2" opacity="0.3" filter="url(#blur)"/>
  <!-- Main circle -->
  <circle cx="60" cy="60" r="45" fill="none" stroke="url(#glow)" stroke-width="2.5" opacity="0.6"/>
  <!-- C letter -->
  <path d="M 78 38 A 32 32 0 1 0 78 82" fill="none" stroke="url(#glow)" stroke-width="5" stroke-linecap="round" filter="url(#glow-filter)"/>
  <!-- Neural nodes -->
  <circle cx="78" cy="38" r="4" fill="#00D4FF" filter="url(#glow-filter)"/>
  <circle cx="78" cy="82" r="4" fill="#7C3AED" filter="url(#glow-filter)"/>
  <circle cx="28" cy="60" r="3" fill="#00D4FF" opacity="0.8"/>
  <circle cx="42" cy="35" r="2.5" fill="#00D4FF" opacity="0.6"/>
  <circle cx="42" cy="85" r="2.5" fill="#7C3AED" opacity="0.6"/>
  <!-- Connection lines -->
  <line x1="78" y1="38" x2="42" y2="35" stroke="#00D4FF" stroke-width="0.8" opacity="0.3"/>
  <line x1="42" y1="35" x2="28" y2="60" stroke="#00D4FF" stroke-width="0.8" opacity="0.3"/>
  <line x1="28" y1="60" x2="42" y2="85" stroke="#7C3AED" stroke-width="0.8" opacity="0.3"/>
  <line x1="42" y1="85" x2="78" y2="82" stroke="#7C3AED" stroke-width="0.8" opacity="0.3"/>
</svg>
