# Docker Compose for local testing
# Simulates production environment

version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: cortex-postgres
    environment:
      POSTGRES_DB: cortex_capital
      POSTGRES_USER: cortex
      POSTGRES_PASSWORD: cortex_local_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cortex"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: cortex-backend
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://cortex:cortex_local_password@postgres:5432/cortex_capital
      TRADIER_TOKEN: ${TRADIER_TOKEN}
      TRADIER_BASE_URL: https://sandbox.tradier.com
      JWT_SECRET: ${JWT_SECRET:-local_jwt_secret_change_in_production}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-local_encryption_key_32_chars}
      RESEND_API_KEY: ${RESEND_API_KEY}
      SUPPORT_EMAIL: ${SUPPORT_EMAIL:-support@cortexcapital.ai}
      APP_URL: http://localhost:3001
      ALLOWED_ORIGINS: http://localhost:3001,http://localhost:3000
      LOG_LEVEL: debug
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend (Next.js)
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile.local
    container_name: cortex-frontend
    ports:
      - "3001:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3000
      NODE_ENV: production
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:

networks:
  default:
    name: cortex-network
